# Training Config - 4GB VRAM (GTX 1650)
training:
  learning_rate: 1.0e-4
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  lr_scheduler: "cosine"
  lr_warmup_steps: 100
  num_epochs: 50
  max_steps: -1

  batch_size: 1
  gradient_accumulation_steps: 4
  dataloader_num_workers: 0

  mixed_precision: "fp16"

  use_ema: false

  checkpoint_every: 250
  checkpoint_dir: "checkpoints"
  resume_from: null
  max_checkpoints: 3

  log_every: 10
  sample_every: 0
  log_dir: "logs"

  cfg_dropout_prob: 0.1

  # Disable image conditioning — saves ~350MB VRAM (no CLIP encoder needed)
  image_conditioning:
    enabled: false

  gradient_checkpointing: true
  enable_xformers: true

  temporal_loss_weight: 0.01
  snr_gamma: 5.0

dataset:
  root_dir: "data/videos"
  manifest_path: "data/manifest.csv"
  num_frames: 16
  frame_height: 64
  frame_width: 64
  fps: 8
  random_flip: true
  random_crop: false
