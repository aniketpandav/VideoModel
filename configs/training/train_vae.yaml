# Training Config - VAE
training:
  # Optimization
  learning_rate: 1.0e-4
  weight_decay: 0.0
  adam_beta1: 0.5
  adam_beta2: 0.9
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  # Schedule
  lr_scheduler: "constant"
  lr_warmup_steps: 500
  num_epochs: 50
  max_steps: -1

  # Batching
  batch_size: 1
  gradient_accumulation_steps: 4
  dataloader_num_workers: 0

  # Precision
  mixed_precision: "fp16"

  # EMA
  use_ema: false

  # Checkpointing
  checkpoint_every: 5000
  checkpoint_dir: "checkpoints/vae"
  resume_from: null
  max_checkpoints: 3

  # Logging
  log_every: 50
  sample_every: 1000
  log_dir: "logs/vae"

  # Memory optimization
  gradient_checkpointing: true

# VAE Loss weights
loss:
  reconstruction_weight: 1.0
  kl_weight: 0.00001
  perceptual_weight: 0.1

dataset:
  root_dir: "data/videos"
  manifest_path: "data/manifest.csv"
  num_frames: 16
  frame_height: 64
  frame_width: 64
  fps: 8
  random_flip: true
