# Model Architecture - Small (for dev/testing on 8GB+ VRAM)
model:
  type: "dit"
  # VAE config
  vae:
    in_channels: 3
    latent_channels: 4
    base_channels: 64
    channel_multipliers: [1, 2, 4, 4]
    num_res_blocks: 2
    temporal_downsample: 4
    spatial_downsample: 8
  # DiT config
  dit:
    hidden_size: 512
    num_layers: 12
    num_heads: 8
    mlp_ratio: 4.0
    patch_size: [1, 2, 2]  # [T, H, W]
    max_temporal_length: 64
    max_spatial_length: 4096
    dropout: 0.0
    use_flash_attention: true
    gradient_checkpointing: true
  # Text encoder
  text_encoder:
    name: "t5-small"
    max_length: 128
    hidden_size: 512
  # Image encoder
  image_encoder:
    name: "openai/clip-vit-base-patch16"
    hidden_size: 768

# Diffusion config
diffusion:
  num_timesteps: 1000
  beta_schedule: "cosine"
  prediction_type: "epsilon"  # "epsilon" or "v_prediction"
  loss_type: "mse"

# Default generation settings
generation:
  num_frames: 32
  duration_seconds: 4
  chunk_frames: 32
  max_duration_seconds: 3600
  height: 256
  width: 256
  fps: 8
  guidance_scale: 7.5
  num_inference_steps: 50
  seed: 42
