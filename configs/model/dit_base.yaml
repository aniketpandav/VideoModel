# Model Architecture - Base (for 24GB+ VRAM)
model:
  type: "dit"
  vae:
    in_channels: 3
    latent_channels: 4
    base_channels: 128
    channel_multipliers: [1, 2, 4, 4]
    num_res_blocks: 3
    temporal_downsample: 4
    spatial_downsample: 8
  dit:
    hidden_size: 1024
    num_layers: 24
    num_heads: 16
    mlp_ratio: 4.0
    patch_size: [1, 2, 2]
    max_temporal_length: 64
    max_spatial_length: 4096
    dropout: 0.0
    use_flash_attention: true
    gradient_checkpointing: true
  text_encoder:
    name: "google/t5-small"
    max_length: 256
    hidden_size: 512
  image_encoder:
    name: "openai/clip-vit-base-patch16"
    hidden_size: 768

diffusion:
  num_timesteps: 1000
  beta_schedule: "cosine"
  prediction_type: "epsilon"
  loss_type: "mse"

generation:
  num_frames: 32
  duration_seconds: 4
  chunk_frames: 32
  max_duration_seconds: 3600
  height: 512
  width: 512
  fps: 16
  guidance_scale: 7.5
  num_inference_steps: 50
  seed: 42
