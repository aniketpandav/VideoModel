<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Video Generator</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: system-ui, sans-serif; background:#0b0d12; color:#e8eaf0;
         margin:0; display:flex; min-height:100vh; align-items:center; justify-content:center; }
  .card { width:min(680px,92vw); background:#141823; border:1px solid #232838;
          border-radius:16px; padding:28px; box-shadow:0 10px 40px rgba(0,0,0,.4); }
  h1 { margin:0 0 4px; font-size:22px; }
  .sub { color:#8b93a7; font-size:13px; margin-bottom:20px; }
  .row { display:flex; gap:10px; }
  input[type=text] { flex:1; padding:12px 14px; border-radius:10px; border:1px solid #2c3245;
          background:#0e111a; color:#e8eaf0; font-size:15px; }
  button { padding:12px 20px; border:0; border-radius:10px; background:#5b8cff; color:#fff;
          font-weight:600; font-size:15px; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .stage { margin-top:20px; min-height:220px; display:flex; align-items:center;
          justify-content:center; background:#0e111a; border:1px dashed #2c3245; border-radius:12px; }
  .stage img, .stage video { max-width:100%; max-height:360px; border-radius:8px; image-rendering:pixelated; }
  .status { margin-top:12px; font-size:13px; color:#8b93a7; }
  .bar { height:6px; background:#1c2233; border-radius:99px; overflow:hidden; margin-top:8px; }
  .bar > div { height:100%; width:0; background:#5b8cff; transition:width .3s; }
  .badge { display:inline-block; font-size:11px; color:#ffd479; border:1px solid #4a431f;
          background:#211d10; border-radius:6px; padding:2px 7px; margin-top:14px; }
</style>
</head>
<body>
  <div class="card">
    <h1>AI Video Generator</h1>
    <div class="sub">Toy model demo &middot; try <code>left</code>, <code>right</code>, <code>up</code>, <code>down</code> in your prompt</div>
    <div class="row">
      <input id="prompt" type="text" placeholder="a red square moving right" value="a red square moving right" />
      <button id="go">Generate</button>
    </div>
    <div class="stage" id="stage"><span class="status">Output appears here</span></div>
    <div class="bar"><div id="bar"></div></div>
    <div class="status" id="status">Idle</div>
    <div class="badge">AI-generated content</div>
  </div>
<script>
const $ = id => document.getElementById(id);
async function poll(jobId){
  while(true){
    const r = await fetch(`/v1/videos/${jobId}`); const j = await r.json();
    $('bar').style.width = (j.progress||0) + '%';
    $('status').textContent = `${j.status} (${j.progress||0}%)`;
    if(j.status === 'done'){
      const url = j.url + '?t=' + Date.now();
      $('stage').innerHTML = url.includes('.gif')
        ? `<img src="${url}">`
        : `<video src="${url}" autoplay loop muted controls></video>`;
      return;
    }
    if(j.status === 'failed'){ $('stage').innerHTML = `<span class="status">Error: ${j.error||'failed'}</span>`; return; }
    await new Promise(res => setTimeout(res, 700));
  }
}
$('go').onclick = async () => {
  $('go').disabled = true; $('stage').innerHTML = '<span class="status">Generating…</span>';
  try {
    const r = await fetch('/v1/videos', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({prompt: $('prompt').value, steps: 50})});
    const j = await r.json();
    await poll(j.job_id);
  } catch(e){ $('stage').innerHTML = `<span class="status">Error: ${e}</span>`; }
  finally { $('go').disabled = false; }
};
</script>
</body>
</html>
